name: Build and Send APK to Telegram

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-send:
    runs-on: ubuntu-latest
    env:
      TELEGRAM_BOT_TOKEN: "7818903497:AAHKM3JaPTScXL1qy80LDzUTrkZwLwUwBis"
      TELEGRAM_CHAT_ID: "-1001438313485"
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '21'
      
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || yes | $ANDROID_HOME/tools/bin/sdkmanager --licenses || true

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Build Bcore AAR
        run: ./gradlew :Bcore:assembleRelease

      - name: Find Bcore AAR path
        id: aar_paths
        run: |
          RELEASE_AAR=$(find ./Bcore/build/outputs/aar -name "*release.aar" | head -n 1)
          echo "release_aar_path=$RELEASE_AAR" >> $GITHUB_OUTPUT

      - name: Send Bcore Release AAR to Telegram and Pin
        run: |
          AAR_PATH="${{ steps.aar_paths.outputs.release_aar_path }}"
          if [ -f "$AAR_PATH" ]; then
            echo "Uploading $AAR_PATH..."
            RESPONSE=$(curl -s -F document=@"$AAR_PATH" \
                 -F chat_id="$TELEGRAM_CHAT_ID" \
                 -F caption="[Bcore RELEASE AAR]" \
                 https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendDocument)

            echo "Telegram Response: $RESPONSE"
            MESSAGE_ID=$(echo "$RESPONSE" | jq -r '.result.message_id // empty' 2>/dev/null)

            if [ -n "$MESSAGE_ID" ] && [ "$MESSAGE_ID" != "null" ]; then
              
              
              
              
              PIN_RESPONSE=$(curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/pinChatMessage" \
                -d chat_id="$TELEGRAM_CHAT_ID" \
                -d message_id="$MESSAGE_ID" \
                -d disable_notification=true)
              PIN_OK=$(echo "$PIN_RESPONSE" | jq -r '.ok // false' 2>/dev/null)
              if [ "$PIN_OK" = "true" ]; then
                echo "Pinned AAR message_id=$MESSAGE_ID successfully."
              else
                PIN_DESC=$(echo "$PIN_RESPONSE" | jq -r '.description // "unknown error"' 2>/dev/null)
                echo "WARNING: pinChatMessage failed for AAR message_id=$MESSAGE_ID: $PIN_DESC"
                echo "WARNING: usually means the bot lacks 'Pin Messages' admin permission in the chat. AAR was sent successfully."
              fi
            else
              echo "Failed to send AAR. See Telegram Response above."
            fi
          else
            echo "Release AAR file not found!"
          fi

      - name: Find APK paths
        id: apk_paths
        run: |
          RELEASE_APK=$(find ./app/build/outputs/apk/release -name "*.apk" | head -n 1)
          echo "release_apk_path=$RELEASE_APK" >> $GITHUB_OUTPUT

      - name: Send ALL Release APKs to Telegram and Pin
        run: |
          shopt -s nullglob
          for APK in ./app/build/outputs/apk/release/*.apk; do
            echo "Uploading $APK..."
            RESPONSE=$(curl -s -F document=@"$APK" \
                 -F chat_id="$TELEGRAM_CHAT_ID" \
                 -F caption="[RELEASE] $(basename "$APK")" \
                 https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendDocument)

            echo "Telegram Response: $RESPONSE"
            MESSAGE_ID=$(echo "$RESPONSE" | jq -r '.result.message_id // empty' 2>/dev/null)

            if [ -n "$MESSAGE_ID" ] && [ "$MESSAGE_ID" != "null" ]; then
              
              PIN_RESPONSE=$(curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/pinChatMessage" \
                -d chat_id="$TELEGRAM_CHAT_ID" \
                -d message_id="$MESSAGE_ID" \
                -d disable_notification=true)
              PIN_OK=$(echo "$PIN_RESPONSE" | jq -r '.ok // false' 2>/dev/null)
              if [ "$PIN_OK" = "true" ]; then
                echo "Pinned $APK (message_id=$MESSAGE_ID) successfully."
              else
                PIN_DESC=$(echo "$PIN_RESPONSE" | jq -r '.description // "unknown error"' 2>/dev/null)
                echo "WARNING: pinChatMessage failed for $APK (message_id=$MESSAGE_ID): $PIN_DESC"
                echo "WARNING: usually means the bot lacks 'Pin Messages' admin permission in the chat. APK was sent successfully."
              fi
            else
              echo "Failed to send APK $APK. See Telegram Response above."
            fi
          done
